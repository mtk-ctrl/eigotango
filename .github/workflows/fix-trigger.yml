name: Fix handle_new_user trigger (one-shot)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-trigger.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Recreate trigger with public-qualified table + search_path
        run: |
          set -e
          SQL='CREATE OR REPLACE FUNCTION public.handle_new_user() RETURNS TRIGGER LANGUAGE plpgsql SECURITY DEFINER SET search_path = public AS $func$ BEGIN INSERT INTO public.profiles (id, role, display_name) VALUES (NEW.id, COALESCE(NEW.raw_user_meta_data->>'"'"'role'"'"', '"'"'student'"'"'), COALESCE(NEW.raw_user_meta_data->>'"'"'display_name'"'"', NEW.email)) ON CONFLICT (id) DO UPDATE SET role = EXCLUDED.role, display_name = EXCLUDED.display_name; RETURN NEW; END; $func$;'
          echo "=== applying fix ==="
          curl -s -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg q "$SQL" '{query:$q}')"
          echo ""

      - name: Test signup against GoTrue
        run: |
          URL="https://ocsqmilqknsneowaxjso.supabase.co"
          ANON="sb_publishable_TQ_mhpVowup7-KoA7DoBRQ_4gGB1pZ9"
          TEST_EMAIL="diag+$(date +%s)@example.com"
          echo "=== signup test for $TEST_EMAIL ==="
          curl -s -w "\nHTTP %{http_code}\n" -X POST "$URL/auth/v1/signup" \
            -H "apikey: $ANON" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$TEST_EMAIL\",\"password\":\"test123456\",\"data\":{\"role\":\"parent\",\"display_name\":\"diag\"}}"
          echo ""
          echo "=== cleanup test users ==="
          curl -s -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "DELETE FROM auth.users WHERE email LIKE '\''diag+%@example.com'\''"}'
