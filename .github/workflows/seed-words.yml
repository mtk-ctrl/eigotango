name: Seed words (throwaway)

# 使い捨て: 本番 words テーブルへ単語データを Management API 経由で投入する。
# db push は SUPABASE_DB_PASSWORD 未設定でスキップされるため、ここで直接 SQL を流す。
# このファイル自身の push をトリガーにして 1 回だけ実行 → 実行後に削除する。
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/seed-words.yml'
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply seed via Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -Rs '{query: .}' supabase/migrations/20240104000000_seed_words.sql)
          echo "投入する単語シードSQLを Management API に送信..."
          HTTP=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
            -X POST "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "HTTP $HTTP"
          cat /tmp/resp.json
          echo
          if [ "$HTTP" -ge 300 ]; then
            echo "❌ シード投入失敗"
            exit 1
          fi
          echo "件数確認..."
          COUNT_PAYLOAD=$(jq -n '{query: "select count(*) as n from words;"}')
          curl -sS -X POST "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$COUNT_PAYLOAD"
          echo
          echo "✅ シード投入完了"
