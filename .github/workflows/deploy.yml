name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# main への同時 push が重なった場合、古いものをキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. TypeScript 型チェック（PR・main 両方で実行）
  # ──────────────────────────────────────────────
  typecheck:
    name: TypeScript チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  # ──────────────────────────────────────────────
  # 2. Supabase: DB マイグレーション + Edge Functions
  #    main push 時のみ、typecheck 成功後に実行
  # ──────────────────────────────────────────────
  deploy-supabase:
    name: Supabase デプロイ
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # プロジェクトにリンク（マイグレーション用・DB パスワード不要）
      - name: Supabase プロジェクトにリンク
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      # 未適用マイグレーションを冪等に適用（Management API 経由）
      - name: DB マイグレーション適用
        run: supabase db push --linked

      # Edge Function が参照するシークレットを同期
      - name: Edge Function シークレット設定
        run: |
          supabase secrets set \
            LINE_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }} \
            LINE_CHANNEL_SECRET=${{ secrets.LINE_CHANNEL_SECRET }} \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      # batch-notify Edge Function をデプロイ
      - name: Edge Function デプロイ (batch-notify)
        run: |
          supabase functions deploy batch-notify \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

  # ──────────────────────────────────────────────
  # 3. Cloudflare Worker: Cron トリガー
  #    main push 時のみ、typecheck 成功後に実行
  # ──────────────────────────────────────────────
  deploy-worker:
    name: Cloudflare Worker デプロイ (Cron)
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Wrangler デプロイ
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
