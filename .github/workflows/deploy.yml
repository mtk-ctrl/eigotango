name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # 手動実行も可能（Actions 画面 / API から）

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────
  # 1. TypeScript チェック（PR でも実行）
  # ─────────────────────────────────
  typecheck:
    name: TypeScript チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  # ─────────────────────────────────
  # 2. Supabase DB マイグレーション
  #    必須: SUPABASE_PROJECT_REF, SUPABASE_ACCESS_TOKEN
  # ─────────────────────────────────
  deploy-supabase-db:
    name: DB マイグレーション
    needs: typecheck
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: プロジェクトにリンク
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: マイグレーション適用
        run: supabase db push --linked

  # ─────────────────────────────────
  # 3. Edge Function デプロイ
  #    LINE_CHANNEL_ACCESS_TOKEN が設定済みの場合のみ実行
  # ─────────────────────────────────
  deploy-supabase-functions:
    name: Edge Function デプロイ
    needs: deploy-supabase-db
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Edge Function シークレット同期（LINE 設定済みの場合のみ）
        run: |
          if [ -n "$LINE_TOKEN" ]; then
            supabase secrets set \
              LINE_CHANNEL_ACCESS_TOKEN=$LINE_TOKEN \
              LINE_CHANNEL_SECRET=$LINE_SECRET \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
            echo "✅ LINE シークレット設定完了"
          else
            echo "⏭️ LINE_CHANNEL_ACCESS_TOKEN 未設定のためスキップ"
          fi
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
      - name: batch-notify デプロイ（LINE 設定済みの場合のみ）
        run: |
          if [ -n "$LINE_TOKEN" ]; then
            supabase functions deploy batch-notify \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
            echo "✅ batch-notify デプロイ完了"
          else
            echo "⏭️ LINE_CHANNEL_ACCESS_TOKEN 未設定のためスキップ"
          fi
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}

  # ─────────────────────────────────
  # 4. Cloudflare Worker（Cron）デプロイ
  #    CLOUDFLARE_API_TOKEN が設定済みの場合のみ実行
  # ─────────────────────────────────
  # Next.js アプリ本体は Cloudflare の Git 連携（Workers Builds）が
  # push を検知して自動ビルド・デプロイするため、ここでは扱わない。

  # Cron Worker（batch-notify を毎朝叩く）だけ CI からデプロイ
  deploy-cron-worker:
    name: Cron Worker デプロイ
    needs: typecheck
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Wrangler デプロイ（Cloudflare 設定済みの場合のみ）
        run: |
          if [ -n "$CF_TOKEN" ]; then
            npx wrangler deploy --config cloudflare/wrangler.toml
            echo "✅ Cron Worker デプロイ完了"
          else
            echo "⏭️ CLOUDFLARE_API_TOKEN 未設定のためスキップ"
          fi
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
