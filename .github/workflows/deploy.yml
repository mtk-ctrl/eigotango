name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # 手動実行も可能（Actions 画面 / API から）

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────
  # 1. TypeScript チェック（PR でも実行）
  # ─────────────────────────────────
  typecheck:
    name: TypeScript チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  # ─────────────────────────────────
  # 2. Supabase DB マイグレーション
  #    必須: SUPABASE_PROJECT_REF, SUPABASE_ACCESS_TOKEN
  # ─────────────────────────────────
  deploy-supabase-db:
    name: DB マイグレーション
    needs: typecheck
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: プロジェクトにリンク
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: マイグレーション適用（db push は DB 直結・パスワード必須。504 はフレーキーなので最大3回リトライ）
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "⏭️ SUPABASE_DB_PASSWORD 未設定のためスキップ（手動で Supabase にマイグレーション適用が必要）"
            exit 0
          fi
          for i in 1 2 3; do
            if supabase db push --linked; then
              echo "✅ マイグレーション適用完了"
              exit 0
            fi
            echo "⚠️ 試行 $i 失敗。10秒後にリトライ..."
            sleep 10
          done
          echo "❌ マイグレーション適用が3回とも失敗"
          exit 1

  # ─────────────────────────────────
  # 3. Edge Function デプロイ
  #    LINE_CHANNEL_ACCESS_TOKEN が設定済みの場合のみ実行
  # ─────────────────────────────────
  deploy-supabase-functions:
    name: Edge Function デプロイ
    needs: deploy-supabase-db
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Edge Function シークレット同期（LINE 設定済みの場合のみ）
        run: |
          if [ -n "$LINE_TOKEN" ]; then
            supabase secrets set \
              LINE_CHANNEL_ACCESS_TOKEN=$LINE_TOKEN \
              LINE_CHANNEL_SECRET=$LINE_SECRET \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
            echo "✅ LINE シークレット設定完了"
          else
            echo "⏭️ LINE_CHANNEL_ACCESS_TOKEN 未設定のためスキップ"
          fi
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
      - name: batch-notify デプロイ（LINE 設定済みの場合のみ）
        run: |
          if [ -n "$LINE_TOKEN" ]; then
            supabase functions deploy batch-notify \
              --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
            echo "✅ batch-notify デプロイ完了"
          else
            echo "⏭️ LINE_CHANNEL_ACCESS_TOKEN 未設定のためスキップ"
          fi
        env:
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}

  # ─────────────────────────────────
  # 4. Cloudflare Workers デプロイ（Next.js アプリ本体）
  #    CLOUDFLARE_API_TOKEN が設定済みの場合のみ実行
  # ─────────────────────────────────
  deploy-cloudflare-workers:
    name: Cloudflare Workers デプロイ
    needs: typecheck
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build & Deploy（Cloudflare 設定済みの場合のみ）
        run: |
          # トークンに混入しがちな不可視文字・クォート・改行を除去（Authorization header 6111 対策）
          # CF API トークンに使える文字 [A-Za-z0-9_-] 以外をすべて削除する（全角/NBSP/ゼロ幅/引用符も除去）
          export CLOUDFLARE_API_TOKEN="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | LC_ALL=C tr -cd 'A-Za-z0-9_-')"
          export CLOUDFLARE_ACCOUNT_ID="$(printf '%s' "$CLOUDFLARE_ACCOUNT_ID" | LC_ALL=C tr -cd 'A-Za-z0-9')"
          echo "ℹ️ サニタイズ後トークン長: ${#CLOUDFLARE_API_TOKEN} 文字（正常な CF API トークンは 40 文字）"
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            npx opennextjs-cloudflare build
            npx opennextjs-cloudflare deploy
            echo "✅ Cloudflare Workers デプロイ完了"
          else
            echo "⏭️ CLOUDFLARE_API_TOKEN 未設定のためスキップ"
          fi
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_LIFF_ID: ${{ vars.NEXT_PUBLIC_LIFF_ID }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}

  # ─────────────────────────────────
  # 5. Cloudflare Worker（Cron）デプロイ
  # ─────────────────────────────────
  deploy-cron-worker:
    name: Cron Worker デプロイ
    needs: typecheck
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Wrangler デプロイ（Cloudflare 設定済みの場合のみ）
        run: |
          # トークンに混入しがちな不可視文字・クォート・改行を除去（Authorization header 6111 対策）
          # CF API トークンに使える文字 [A-Za-z0-9_-] 以外をすべて削除する（全角/NBSP/ゼロ幅/引用符も除去）
          export CLOUDFLARE_API_TOKEN="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | LC_ALL=C tr -cd 'A-Za-z0-9_-')"
          export CLOUDFLARE_ACCOUNT_ID="$(printf '%s' "$CLOUDFLARE_ACCOUNT_ID" | LC_ALL=C tr -cd 'A-Za-z0-9')"
          echo "ℹ️ サニタイズ後トークン長: ${#CLOUDFLARE_API_TOKEN} 文字（正常な CF API トークンは 40 文字）"
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            npx wrangler deploy --config cloudflare/wrangler.toml
            echo "✅ Cron Worker デプロイ完了"
          else
            echo "⏭️ CLOUDFLARE_API_TOKEN 未設定のためスキップ"
          fi
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
