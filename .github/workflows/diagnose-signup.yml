name: Diagnose signup (one-shot)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-signup.yml'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Real signup call against GoTrue (prints raw response)
        run: |
          URL="https://ocsqmilqknsneowaxjso.supabase.co"
          ANON="sb_publishable_TQ_mhpVowup7-KoA7DoBRQ_4gGB1pZ9"
          TEST_EMAIL="diag+$(date +%s)@example.com"
          echo "=== signup test for $TEST_EMAIL ==="
          curl -s -i -X POST "$URL/auth/v1/signup" \
            -H "apikey: $ANON" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$TEST_EMAIL\",\"password\":\"test123456\",\"data\":{\"role\":\"parent\",\"display_name\":\"diag\"}}"
          echo ""
          echo "=== check trigger & profiles definition via Management API ==="
          curl -s -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT tgname, tgenabled FROM pg_trigger WHERE tgrelid = '\''auth.users'\''::regclass;"}'
          echo ""
          echo "=== profiles columns ==="
          curl -s -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT column_name, is_nullable, data_type FROM information_schema.columns WHERE table_schema='\''public'\'' AND table_name='\''profiles'\'' ORDER BY ordinal_position;"}'
          echo ""
          echo "=== handle_new_user source ==="
          curl -s -X POST \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT prosrc FROM pg_proc WHERE proname='\''handle_new_user'\'';"}'
