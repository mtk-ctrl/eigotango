name = "eigotango-cron"
main = "cloudflare/cron-worker.ts"
compatibility_date = "2024-01-01"

# CLOUDFLARE_ACCOUNT_ID 環境変数で上書きされる（CI での wrangler deploy 時）
# ローカル開発時は wrangler.toml に直接記載しても可
# account_id = "xxxxxxxxxxxx"

[triggers]
# 毎日 UTC 22:00 = JST 07:00
crons = ["0 22 * * *"]

[vars]
# Supabase プロジェクト URL（公開情報・シークレット不要）
# CI デプロイ後、Cloudflare ダッシュボードの環境変数で上書き可
SUPABASE_URL = "https://xxxxxxxxxxxx.supabase.co"

# SUPABASE_SERVICE_ROLE_KEY は wrangler secret で管理（コードに書かない）
# 初回のみオーナーが Cloudflare ダッシュボードで設定
# または: wrangler secret put SUPABASE_SERVICE_ROLE_KEY
